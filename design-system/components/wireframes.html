<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Khelo Bharat — Screen-pattern wireframes</title><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0B2E59; --navy-2:#123E75; --navy-deep:#071E3D; --ink:#152233;
  --saffron:#E87C1E; --saffron-2:#F5A54A; --saffron-deep:#C05E12;
  --green:#1E7A3C; --paper:#F7F4EE; --paper-2:#F0EBE0; --card:#FFFFFF;
  --line:#E3DCCF; --grey:#5B6675; --grey-2:#9FB4CF; --alert:#A33A17;
  --p1:#0B2E59; --p2:#C05E12; --p3:#1E7A3C; --p4:#7A2E7E; --p5:#B3541E; --p6:#14606B;
  --radius:14px; --radius-lg:20px;
  --shadow:0 2px 10px rgba(11,46,89,.06); --shadow-lg:0 20px 46px rgba(11,46,89,.13);
  --font-serif:'Fraunces',Georgia,'Times New Roman',serif; --font-sans:'Inter',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);line-height:1.6;font-size:16px;padding:28px}
h1,h2,h3,h4{font-family:var(--font-serif);color:var(--navy);font-weight:800;line-height:1.12}
.small{font-size:13px}.muted{color:var(--grey)}

.wireframe{background:linear-gradient(160deg,var(--navy),var(--navy-deep));border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow-lg);max-width:420px}
.wf-window{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);border-radius:12px;overflow:hidden}
.wf-bar{display:flex;gap:6px;align-items:center;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.12)}
.wf-bar i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.3)}
.wf-bar i:first-child{background:var(--saffron-2)}
.wf-bar span{margin-left:8px;font-size:10.5px;font-weight:700;letter-spacing:.1em;color:var(--grey-2);text-transform:uppercase}
.wf-body{padding:14px;display:grid;gap:10px}
.wf-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wf-kpi{background:rgba(255,255,255,.09);border-radius:8px;padding:9px}
.wf-kpi b{display:block;font:800 16px/1.2 var(--font-serif);color:#fff}
.wf-kpi span{font-size:8.5px;letter-spacing:.07em;color:var(--grey-2);text-transform:uppercase}
.wf-bars{display:flex;align-items:flex-end;gap:6px;height:74px;padding:0 4px}
.wf-bars i{flex:1;border-radius:4px 4px 0 0;background:rgba(255,255,255,.28)}
.wf-bars i.hi{background:linear-gradient(180deg,var(--saffron-2),var(--saffron))}
.wf-bars i.ok{background:linear-gradient(180deg,#3AA164,var(--green))}
.wf-rows{display:grid;gap:7px}
.wf-row{display:grid;grid-template-columns:22px 1fr 54px;gap:9px;align-items:center;background:rgba(255,255,255,.08);border-radius:8px;padding:8px 10px}
.wf-row i{width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.2)}
.wf-row u{text-decoration:none;height:8px;border-radius:4px;background:rgba(255,255,255,.34);display:block;width:70%}
.wf-row u+u{margin-top:4px;width:45%;opacity:.55}
.wf-row s{text-decoration:none;font-size:8.5px;font-weight:800;text-align:center;color:var(--navy-deep);background:var(--saffron-2);border-radius:8px;padding:2px 4px}
.wf-row s.g{background:#7fd49d}
.wf-steps{display:flex;align-items:center;gap:4px;padding:6px 2px}
.wf-steps b{width:24px;height:24px;flex-shrink:0;border-radius:50%;background:var(--green);color:#fff;font-size:11px;line-height:24px;text-align:center}
.wf-steps b.pend{background:rgba(255,255,255,.22)}.wf-steps b.cur{background:var(--saffron)}
.wf-steps i{flex:1;height:2px;background:rgba(255,255,255,.25)}
.wf-caption{margin-top:10px;font-size:12px;color:var(--grey-2)}.wf-caption b{color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px}
</style></head><body>

<div class="grid">
<div class="wireframe"><div class="wf-window"><div class="wf-bar"><i></i><i></i><i></i><span>Dashboard pattern</span></div>
<div class="wf-body"><div class="wf-kpis"><div class="wf-kpi"><b>2.1L</b><span>records</span></div><div class="wf-kpi"><b>86%</b><span>on time</span></div><div class="wf-kpi"><b>14</b><span>flagged</span></div><div class="wf-kpi"><b>#3</b><span>rank</span></div></div>
<div class="wf-bars"><i style="height:62%"></i><i class="hi" style="height:88%"></i><i style="height:47%"></i><i style="height:71%"></i><i style="height:58%"></i><i class="ok" style="height:93%"></i><i style="height:66%"></i><i style="height:79%"></i></div><div class="wf-row"><i></i><span><u></u><u></u></span><s>VIEW</s></div><div class="wf-row"><i></i><span><u></u><u></u></span><s class="g">OK</s></div><div class="wf-row"><i></i><span><u></u><u></u></span><s>VIEW</s></div></div></div>
<div class="wf-caption"><b>Dashboard</b> — command centres, index views (M19)</div></div>
<div class="wireframe"><div class="wf-window"><div class="wf-bar"><i></i><i></i><i></i><span>Workflow pattern</span></div>
<div class="wf-body"><div class="wf-steps"><b>✓</b><i></i><b>✓</b><i></i><b class="cur">3</b><i></i><b class="pend">4</b><i></i><b class="pend">5</b></div><div class="wf-row"><i></i><span><u></u><u></u></span><s>VIEW</s></div><div class="wf-row"><i></i><span><u></u><u></u></span><s class="g">OK</s></div><div class="wf-row"><i></i><span><u></u><u></u></span><s>VIEW</s></div></div></div>
<div class="wf-caption"><b>Workflow</b> — applications, approvals, file tracking (M3)</div></div>
</div>

</body></html>
