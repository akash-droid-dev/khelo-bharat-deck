<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Khelo Bharat — Stat tiles</title><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0B2E59; --navy-2:#123E75; --navy-deep:#071E3D; --ink:#152233;
  --saffron:#E87C1E; --saffron-2:#F5A54A; --saffron-deep:#C05E12;
  --green:#1E7A3C; --paper:#F7F4EE; --paper-2:#F0EBE0; --card:#FFFFFF;
  --line:#E3DCCF; --grey:#5B6675; --grey-2:#9FB4CF; --alert:#A33A17;
  --p1:#0B2E59; --p2:#C05E12; --p3:#1E7A3C; --p4:#7A2E7E; --p5:#B3541E; --p6:#14606B;
  --radius:14px; --radius-lg:20px;
  --shadow:0 2px 10px rgba(11,46,89,.06); --shadow-lg:0 20px 46px rgba(11,46,89,.13);
  --font-serif:'Fraunces',Georgia,'Times New Roman',serif; --font-sans:'Inter',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);line-height:1.6;font-size:16px;padding:28px}
h1,h2,h3,h4{font-family:var(--font-serif);color:var(--navy);font-weight:800;line-height:1.12}
.small{font-size:13px}.muted{color:var(--grey)}

.stat-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.stat-tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.stat-tile b{display:block;font:800 30px/1.1 var(--font-serif);color:var(--navy)}
.stat-tile span{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--grey)}
.dark{background:linear-gradient(165deg,var(--navy-deep),var(--navy));border-radius:var(--radius-lg);padding:22px;margin-top:16px}
.dark .stat-tile{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.16)}
.dark .stat-tile b{color:#fff}.dark .stat-tile span{color:var(--grey-2)}
</style></head><body>

<div class="stat-tiles">
<div class="stat-tile"><b>6</b><span>Pillars</span></div>
<div class="stat-tile"><b>20</b><span>Modules</span></div>
<div class="stat-tile"><b>17/23</b><span>Systems verified</span></div>
<div class="stat-tile"><b>66</b><span>Approvals mapped</span></div>
</div>
<div class="dark"><div class="stat-tiles">
<div class="stat-tile"><b>76</b><span>Datasets</span></div>
<div class="stat-tile"><b>54 · 9</b><span>Questions · blocking</span></div>
<div class="stat-tile"><b>63</b><span>Integration edges</span></div>
<div class="stat-tile"><b>26</b><span>Stakeholders</span></div>
</div></div>

</body></html>
